<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalenteri</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#111;padding:16px;min-height:100vh}
.app{display:grid;grid-template-columns:340px 1fr;gap:14px;align-items:start}

/* KALENTERI */
.panel{background:#1c1c1c;border:1px solid #333;border-radius:16px;overflow:hidden}
.cal-nav{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid #333}
.nav-btn{background:#2a2a2a;border:1px solid #444;border-radius:8px;width:30px;height:30px;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-btn:hover{background:#FFD600;color:#111}
.cal-title{font-size:14px;font-weight:500;color:#fff;flex:1;text-align:center}
.seg{display:flex;background:#111;border-radius:8px;padding:3px;gap:2px;flex-shrink:0}
.seg-btn{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888}
.seg-btn.on{background:#FFD600;color:#111;font-weight:700}
.week-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.week-day-row{display:flex;gap:10px;align-items:flex-start}
.week-day-label{width:40px;flex-shrink:0;text-align:center}
.wdl-name{font-size:9px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.06em}
.wdl-num{font-size:20px;font-weight:500;color:#aaa;line-height:1.1}
.wdl-num.today-n{width:32px;height:32px;border-radius:50%;background:#FFD600;color:#111;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto}
.week-day-drop{flex:1;min-height:40px;border-radius:10px;border:1.5px dashed #333;background:#161616;padding:5px;display:flex;flex-direction:column;gap:3px;transition:border-color .12s,background .12s}
.week-day-drop.has-tasks{border-style:solid;border-color:#444;background:#1c1c1c}
.week-day-drop.drag-over{border-color:#FFD600;background:#2a2500}
.week-day-drop.today-drop{border-color:#555;border-style:solid;background:#1c1c1c}
.wk-task{border-radius:6px;padding:5px 7px;font-size:11px;font-weight:500;line-height:1.3;display:flex;align-items:center;gap:5px}
.wk-task.korkea{background:#FFD600;color:#111}
.wk-task.normaali{background:#e6c000;color:#111}
.wk-task.matala{background:#b89b00;color:#111}
.wk-task.done-task{background:#2a2a2a;color:#555;border:1px solid #333;text-decoration:line-through}
.wk-task.recurring{background:#2a2a2a;color:#FFD600;border:1px solid #444;border-left:3px solid #FFD600}
.wk-task.recurring.done-rec{background:#1c1c1c;color:#555;border-color:#333;border-left-color:#555;text-decoration:line-through}
.task-check{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:rgba(0,0,0,.15)}
.task-check svg{width:7px;height:7px;stroke:#111;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.rec-check{width:13px;height:13px;border-radius:50%;border:1.5px solid #FFD600;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.rec-check.done{background:#FFD600}
.rec-check svg{width:7px;height:7px;stroke:#111;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.wk-task-name{flex:1;word-break:break-word}
.wk-rm{background:none;border:none;cursor:pointer;color:inherit;opacity:.35;font-size:13px;padding:0;line-height:1;flex-shrink:0}
.wk-rm:hover{opacity:1}
.drop-hint{font-size:10px;color:#444;text-align:center;padding:6px 0;pointer-events:none}
.month-body{padding:8px 10px 12px}
.month-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.month-dow span{text-align:center;font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;padding:4px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.m-cell{min-height:58px;border-radius:10px;padding:4px;border:1.5px solid transparent;cursor:pointer}
.m-cell:hover{background:#2a2a2a}
.m-cell.other{opacity:.3}
.m-cell.sel{background:#2a2a2a;border-color:#555}
.m-cell.drag-over{border-color:#FFD600;background:#2a2500}
.m-num{font-size:11px;font-weight:500;color:#888;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.m-num.today{background:#FFD600;color:#111;font-weight:700}
.m-chip{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.m-chip.korkea{background:#FFD600;color:#111}
.m-chip.normaali{background:#e6c000;color:#111}
.m-chip.matala{background:#b89b00;color:#111}
.m-chip.rec{background:#2a2a2a;color:#FFD600;border:1px solid #444}
.m-more{font-size:9px;color:#666}
.day-panel{display:none;background:#1c1c1c;border:1px solid #333;border-radius:16px;overflow:hidden;margin-top:12px}
.day-panel.open{display:block}
.dp-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #333}
.dp-title{font-size:13px;font-weight:500;color:#fff}
.dp-close{background:none;border:none;cursor:pointer;color:#555;font-size:20px;line-height:1;padding:0}
.dp-close:hover{color:#fff}
.dp-body{padding:8px;display:flex;flex-direction:column;gap:5px}
.dp-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#2a2a2a;border-radius:8px;border:1px solid #333}
.dp-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#FFD600}
.dp-dot.rec{background:transparent;border:2px solid #FFD600}
.dp-name{font-size:12px;font-weight:500;color:#fff;flex:1}
.dp-rm{background:none;border:none;cursor:pointer;color:#555;font-size:16px;line-height:1}
.dp-rm:hover{color:#ff4444}
.dp-empty{font-size:12px;color:#555;text-align:center;padding:14px;line-height:1.6}

/* OIKEA PANEELI — 3 listaa */
.right-panel{display:flex;flex-direction:column;gap:10px;position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto}
.right-panel::-webkit-scrollbar{width:4px}
.right-panel::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.pri-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;align-items:start}

.pri-section {border-radius:14px;overflow:hidden;flex-shrink:0}
.pri-section.korkea{border-top:2px solid #FFD600;background:#1c1c1c;border:1px solid #333;border-top:2px solid #FFD600}
.pri-section.normaali{background:#1c1c1c;border:1px solid #333;border-top:2px solid #e6c000}
.pri-section.matala{background:#1c1c1c;border:1px solid #333;border-top:2px solid #b89b00}
.pri-section.drop-over{outline:2px solid #FFD600;outline-offset:-2px}
.pri-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #2a2a2a;cursor:pointer;user-select:none}
.pri-head:hover{background:#222}
.pri-head-left{display:flex;align-items:center;gap:8px}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pri-dot.korkea{background:#FFD600}
.pri-dot.normaali{background:#e6c000}
.pri-dot.matala{background:#b89b00}
.pri-label{font-size:12px;font-weight:600;color:#fff}
.pri-count{font-size:11px;color:#555;background:#2a2a2a;padding:1px 7px;border-radius:20px}
.pri-chevron{font-size:12px;color:#555;transition:transform .15s}
.pri-chevron.open{transform:rotate(90deg)}
.pri-body{padding:6px;display:flex;flex-direction:column;gap:3px}
.pri-body.collapsed{display:none}
.add-btn-small{width:100%;padding:5px;border:1px dashed #333;border-radius:8px;background:none;color:#555;font-size:11px;cursor:pointer;text-align:center}
.add-btn-small:hover{border-color:#FFD600;color:#FFD600}

.t-card{border-radius:8px;border:1px solid #333;background:#2a2a2a;padding:6px 9px;cursor:grab;user-select:none}
.t-card:active{cursor:grabbing;opacity:.5}
.t-card.dragging{opacity:.25}
.t-card.sched{border-left:2px solid #FFD600;border-radius:0 8px 8px 0}
.t-card.expired-card{border-left:2px solid #ff4444;border-radius:0 8px 8px 0}
.t-card.done-card{opacity:.4;border-style:dashed;cursor:default}
.r-card{border-radius:0 8px 8px 0;border:1px solid #444;background:#2a2a2a;padding:6px 9px;border-left:2px solid #FFD600}
.t-row{display:flex;align-items:center;gap:5px}
.done-check{width:14px;height:14px;border-radius:50%;border:1.5px solid #555;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:transparent}
.done-check.checked{background:#FFD600;border-color:#FFD600}
.done-check svg{width:8px;height:8px;stroke:#111;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.t-name{font-size:11px;font-weight:500;color:#fff;flex:1;line-height:1.35}
.t-btns{display:flex;gap:1px;opacity:0;flex-shrink:0}
.t-card:hover .t-btns,.r-card:hover .t-btns{opacity:1}
.iBtn{background:none;border:none;cursor:pointer;width:17px;height:17px;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#555}
.iBtn:hover{background:#333;color:#fff}
.iBtn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sched-txt{font-size:10px;color:#FFD600;white-space:nowrap;flex-shrink:0}
.expired-lbl{font-size:10px;color:#ff4444;flex-shrink:0}
.rec-pill{font-size:10px;font-weight:600;color:#FFD600;background:#2a2500;border:1px solid #FFD60044;padding:1px 6px;border-radius:20px;white-space:nowrap}
.tag-txt{font-size:10px;color:#555}
.t-empty{font-size:11px;color:#444;text-align:center;padding:10px;line-height:1.5}

/* ARKISTO + TOISTUVAT ERILLINEN */
.extra-panel{background:#1c1c1c;border:1px solid #333;border-radius:14px;overflow:hidden;flex-shrink:0}
.ep-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #2a2a2a;cursor:pointer}
.ep-head:hover{background:#222}
.ep-title{font-size:12px;font-weight:600;color:#888}
.ep-chevron{font-size:12px;color:#555;transition:transform .15s}
.ep-chevron.open{transform:rotate(90deg)}
.ep-body{padding:6px;display:flex;flex-direction:column;gap:3px}
.ep-body.collapsed{display:none}

/* MODAALIT */
.m-wrap{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center}
.m-wrap.open{display:flex}
.m-scrim{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.modal{position:relative;z-index:1;background:#1c1c1c;border:1px solid #444;border-radius:16px;padding:22px;width:92%;max-width:360px}
.m-title{font-size:14px;font-weight:500;margin-bottom:16px;color:#fff}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1px solid #444;border-radius:10px;background:#2a2a2a;color:#fff;font-size:13px;font-family:inherit}
.field input::placeholder,.field textarea::placeholder{color:#555}
.field textarea{resize:vertical;min-height:48px;line-height:1.5}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.m-foot button{height:34px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #444}
.btn-ok{background:#FFD600;color:#111;border-color:#FFD600;font-weight:700}
.btn-ok:hover{background:#ffe033}
.btn-ko{background:transparent;color:#888;border-color:#333}
.btn-ko:hover{background:#2a2a2a}
.rec-toggle{display:flex;gap:6px;margin-bottom:12px}
.rec-toggle button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #444;background:#2a2a2a;color:#888}
.rec-toggle button.on{background:#FFD600;color:#111;border-color:#FFD600;font-weight:700}
.dow-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px}
.dow-btn{padding:6px 2px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #444;background:#2a2a2a;color:#888;text-align:center}
.dow-btn.on{background:#FFD600;color:#111;border-color:#FFD600}
</style>
</head>
<body>
<div class="app">
  <div>
    <div class="panel">
      <div class="cal-nav">
        <button class="nav-btn" onclick="navBack()">‹</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="nav-btn" onclick="navFwd()">›</button>
        <div class="seg">
          <button class="seg-btn on" id="vt-week" onclick="setView('week')">Viikko</button>
          <button class="seg-btn" id="vt-month" onclick="setView('month')">Kuukausi</button>
        </div>
      </div>
      <div id="cal-body"></div>
    </div>
    <div class="day-panel" id="day-panel">
      <div class="dp-head">
        <span class="dp-title" id="dp-title"></span>
        <button class="dp-close" onclick="closeDay()">×</button>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </div>
  </div>

  <!-- OIKEA PANEELI -->
  <div class="right-panel" id="right-panel"></div>
</div>

<!-- TEHTÄVÄMODAALI -->
<div class="m-wrap" id="mWrap">
  <div class="m-scrim" onclick="closeModal()"></div>
  <div class="modal">
    <div class="m-title" id="mTitle">Uusi tehtävä</div>
    <div class="field"><label>Otsikko</label><input id="mName" placeholder="Tehtävän nimi"></div>
    <div class="mrow">
      <div class="field"><label>Prioriteetti</label>
        <select id="mPri"><option value="korkea">Korkea</option><option value="normaali" selected>Normaali</option><option value="matala">Matala</option></select>
      </div>
      <div class="field"><label>Tagit</label><input id="mTags" placeholder="työ, myynti"></div>
    </div>
    <div class="field"><label>Muistiinpanot</label><textarea id="mNotes" placeholder="Vapaaehtoinen"></textarea></div>
    <div class="m-foot">
      <button class="btn-ko" onclick="closeModal()">Peruuta</button>
      <button class="btn-ok" onclick="saveTask()">Tallenna</button>
    </div>
  </div>
</div>

<!-- TOISTUVAMODAALI -->
<div class="m-wrap" id="rWrap">
  <div class="m-scrim" onclick="closeRModal()"></div>
  <div class="modal">
    <div class="m-title" id="rTitle">Uusi toistuva tehtävä</div>
    <div class="field"><label>Otsikko</label><input id="rName" placeholder="Tehtävän nimi"></div>
    <div class="field"><label>Toistuvuus</label>
      <div class="rec-toggle">
        <button id="rt-weekly" class="on" onclick="setRecType('weekly')">Viikoittain</button>
        <button id="rt-monthly" onclick="setRecType('monthly')">Kuukausittain</button>
      </div>
    </div>
    <div id="r-weekly-opts" class="field">
      <label>Viikonpäivä</label>
      <div class="dow-picker">
        <button class="dow-btn on" data-dow="1" onclick="toggleDow(1)">Ma</button>
        <button class="dow-btn" data-dow="2" onclick="toggleDow(2)">Ti</button>
        <button class="dow-btn" data-dow="3" onclick="toggleDow(3)">Ke</button>
        <button class="dow-btn" data-dow="4" onclick="toggleDow(4)">To</button>
        <button class="dow-btn" data-dow="5" onclick="toggleDow(5)">Pe</button>
        <button class="dow-btn" data-dow="6" onclick="toggleDow(6)">La</button>
        <button class="dow-btn" data-dow="0" onclick="toggleDow(0)">Su</button>
      </div>
    </div>
    <div id="r-monthly-opts" class="field" style="display:none">
      <label>Kuukauden päivä</label>
      <input id="rMonthDay" type="number" min="1" max="31" value="1">
    </div>
    <div class="field"><label>Muistiinpanot</label><textarea id="rNotes" placeholder="Vapaaehtoinen"></textarea></div>
    <div class="m-foot">
      <button class="btn-ko" onclick="closeRModal()">Peruuta</button>
      <button class="btn-ok" onclick="saveRecurring()">Tallenna</button>
    </div>
  </div>
</div>

<script>
const DOW_NAMES=['Ma','Ti','Ke','To','Pe','La','Su'];
const MON_GEN=['tammikuuta','helmikuuta','maaliskuuta','huhtikuuta','toukokuuta','kesäkuuta','heinäkuuta','elokuuta','syyskuuta','lokakuuta','marraskuuta','joulukuuta'];
const MON=['tammikuu','helmikuu','maaliskuu','huhtikuu','toukokuu','kesäkuu','heinäkuu','elokuu','syyskuu','lokakuu','marraskuu','joulukuu'];
const PRI_LABELS={korkea:'Korkea prioriteetti',normaali:'Normaali prioriteetti',matala:'Matala prioriteetti'};

let tasks=[],recurring=[],editId=null,editRId=null,dragId=null,selDate=null;
let view='week',recType='weekly';
let selDows=new Set([1]);
let collapsed={korkea:false,normaali:false,matala:false,rec:true,arch:true};
const now=new Date();
let viewYear=now.getFullYear(),viewMonth=now.getMonth();
let weekStart=weekOf(now);

const eSvg=`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>`;
const dSvg=`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`;
const chk=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

function weekOf(d){const t=new Date(d);let dw=t.getDay()-1;if(dw<0)dw=6;t.setDate(t.getDate()-dw);t.setHours(0,0,0,0);return t;}
function addD(d,n){const t=new Date(d);t.setDate(t.getDate()+n);return t;}
function iso(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;}
function todayIso(){return iso(new Date());}
function fmtShort(s){if(!s)return'';const[,m,d]=s.split('-');return`${parseInt(d)}.${parseInt(m)}.`;}
function fmtFull(s){if(!s)return'';const[y,m,d]=s.split('-');return`${parseInt(d)}. ${MON_GEN[parseInt(m)-1]} ${y}`;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uid(){return Math.random().toString(36).slice(2,10);}

function checkPassword(){
  if(localStorage.getItem('kal-auth')==='ok')return;
  const pw=prompt('Syötä salasana:');
  if(pw!=='3110'){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:#555">Väärä salasana.</div>';return;}
  localStorage.setItem('kal-auth','ok');
}
function load(){
  try{const r=localStorage.getItem('kal5');tasks=r?JSON.parse(r):[];}catch(e){tasks=[];}
  try{const r=localStorage.getItem('kal5-rec');recurring=r?JSON.parse(r):[];}catch(e){recurring=[];}
  expireOld();render();
}
function save(){try{localStorage.setItem('kal5',JSON.stringify(tasks));}catch(e){}}
function saveRec(){try{localStorage.setItem('kal5-rec',JSON.stringify(recurring));}catch(e){}}
function expireOld(){
  const ti=todayIso();let ch=false;
  tasks.forEach(t=>{if(t.scheduledDate&&t.scheduledDate<ti&&!t.done){t.scheduledDate=null;t.expired=true;ch=true;}});
  if(ch)save();
}
function recMatchesDate(r,isoStr){
  const[y,m,d]=isoStr.split('-').map(Number);
  const jsD=new Date(y,m-1,d).getDay();
  if(r.type==='weekly')return r.dows.includes(jsD);
  return parseInt(d)===r.monthDay;
}
function recDoneKey(rId,di){return`rdone-${rId}-${di}`;}
function isRecDone(rId,di){return localStorage.getItem(recDoneKey(rId,di))==='1';}
function setRecDone(rId,di,v){v?localStorage.setItem(recDoneKey(rId,di),'1'):localStorage.removeItem(recDoneKey(rId,di));}
function toggleRecDone(rId,di){setRecDone(rId,di,!isRecDone(rId,di));render();}
function toggleCollapse(key){collapsed[key]=!collapsed[key];renderRight();}

function setView(v){
  view=v;
  document.getElementById('vt-week').classList.toggle('on',v==='week');
  document.getElementById('vt-month').classList.toggle('on',v==='month');
  closeDay();render();
}
function navBack(){view==='week'?weekStart=addD(weekStart,-7):(--viewMonth<0&&(viewMonth=11,viewYear--));closeDay();render();}
function navFwd(){view==='week'?weekStart=addD(weekStart,7):(++viewMonth>11&&(viewMonth=0,viewYear++));closeDay();render();}
function render(){view==='week'?renderWeek():renderMonth();renderRight();if(selDate)renderDayPanel(selDate);}

/* ── VIIKKO ── */
function renderWeek(){
  const ws=weekStart,we=addD(ws,6);
  const sm=ws.getMonth(),em=we.getMonth();
  const title=sm===em?`${ws.getDate()}–${we.getDate()}. ${MON_GEN[sm]} ${ws.getFullYear()}`:`${ws.getDate()}. ${MON_GEN[sm]} – ${we.getDate()}. ${MON_GEN[em]} ${we.getFullYear()}`;
  document.getElementById('cal-title').textContent=title;
  const ti=todayIso();
  let h='<div class="week-body">';
  for(let i=0;i<7;i++){
    const d=addD(ws,i),di=iso(d),isT=di===ti;
    const dt=tasks.filter(t=>t.scheduledDate===di&&!t.done);
    const recs=recurring.filter(r=>recMatchesDate(r,di));
    const hasAny=dt.length||recs.length;
    const numH=isT?`<div class="wdl-num today-n">${d.getDate()}</div>`:`<div class="wdl-num">${d.getDate()}</div>`;
    const recChips=recs.map(r=>{const done=isRecDone(r.id,di);return`<div class="wk-task recurring${done?' done-rec':''}"><button class="rec-check${done?' done':''}" onclick="toggleRecDone('${r.id}','${di}')">${done?chk:''}</button><span class="wk-task-name">${esc(r.name)}</span></div>`;}).join('');
    const taskChips=dt.map(t=>`<div class="wk-task ${t.priority}"><button class="task-check" onclick="toggleDone('${t.id}')">${chk}</button><span class="wk-task-name">${esc(t.name)}</span><button class="wk-rm" onclick="unschedule('${t.id}')">×</button></div>`).join('');
    h+=`<div class="week-day-row"><div class="week-day-label"><div class="wdl-name">${DOW_NAMES[i]}</div>${numH}</div><div class="week-day-drop${hasAny?' has-tasks':''}${isT?' today-drop':''}" id="wc-${di}" ondragover="event.preventDefault();document.getElementById('wc-${di}').classList.add('drag-over')" ondragleave="document.getElementById('wc-${di}').classList.remove('drag-over')" ondrop="document.getElementById('wc-${di}').classList.remove('drag-over');dropOn('${di}')">${recChips}${taskChips}${!hasAny?'<div class="drop-hint">pudota tähän</div>':''}</div></div>`;
  }
  h+='</div>';
  document.getElementById('cal-body').innerHTML=h;
}

/* ── KUUKAUSI ── */
function renderMonth(){
  document.getElementById('cal-title').textContent=MON[viewMonth]+' '+viewYear;
  const ti=todayIso();
  const first=new Date(viewYear,viewMonth,1);
  let sd=first.getDay()-1;if(sd<0)sd=6;
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const prev=new Date(viewYear,viewMonth,0).getDate();
  const total=Math.ceil((sd+dim)/7)*7;
  let h=`<div class="month-body"><div class="month-dow">${DOW_NAMES.map(d=>`<span>${d}</span>`).join('')}</div><div class="month-grid">`;
  for(let i=0;i<total;i++){
    let d,m,y,other=false;
    if(i<sd){d=prev-sd+i+1;m=viewMonth-1;y=viewYear;if(m<0){m=11;y--;}other=true;}
    else if(i>=sd+dim){d=i-sd-dim+1;m=viewMonth+1;y=viewYear;if(m>11){m=0;y++;}other=true;}
    else{d=i-sd+1;m=viewMonth;y=viewYear;}
    const di=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=di===ti,isSel=di===selDate;
    const dt=tasks.filter(t=>t.scheduledDate===di&&!t.done);
    const recs=recurring.filter(r=>recMatchesDate(r,di));
    const numH=isT?`<div class="m-num today">${d}</div>`:`<div class="m-num">${d}</div>`;
    const chips=[...recs.map(r=>`<div class="m-chip rec">${esc(r.name)}</div>`),...dt.map(t=>`<div class="m-chip ${t.priority}">${esc(t.name)}</div>`)];
    h+=`<div class="m-cell${other?' other':''}${isSel?' sel':''}" id="mc-${di}" ondragover="event.preventDefault();document.getElementById('mc-${di}').classList.add('drag-over')" ondragleave="document.getElementById('mc-${di}').classList.remove('drag-over')" ondrop="document.getElementById('mc-${di}').classList.remove('drag-over');dropOn('${di}')" onclick="openDay('${di}')">${numH}${chips.slice(0,2).join('')}${chips.length>2?`<div class="m-more">+${chips.length-2}</div>`:''}</div>`;
  }
  h+='</div></div>';
  document.getElementById('cal-body').innerHTML=h;
}

/* ── PÄIVÄPANEELI ── */
function openDay(di){selDate=di;document.getElementById('day-panel').classList.add('open');renderDayPanel(di);if(view==='month')renderMonth();}
function closeDay(){selDate=null;document.getElementById('day-panel').classList.remove('open');}
function renderDayPanel(di){
  document.getElementById('dp-title').textContent=fmtFull(di);
  const dt=tasks.filter(t=>t.scheduledDate===di&&!t.done);
  const recs=recurring.filter(r=>recMatchesDate(r,di));
  let html=recs.map(r=>`<div class="dp-row"><span class="dp-dot rec"></span><span class="dp-name">↻ ${esc(r.name)}</span></div>`).join('');
  html+=dt.map(t=>`<div class="dp-row"><span class="dp-dot"></span><span class="dp-name">${esc(t.name)}</span><button class="dp-rm" onclick="unschedule('${t.id}')">×</button></div>`).join('');
  document.getElementById('dp-body').innerHTML=html||'<div class="dp-empty">Ei tehtäviä</div>';
}

/* ── OIKEA PANEELI ── */
function renderRight(){
  const el=document.getElementById('right-panel');
  const active=tasks.filter(t=>!t.done);
  const done=tasks.filter(t=>t.done);

  let html='<div class="pri-row">';

  // 3 prioriteettiosiota rinnakkain
  ['korkea','normaali','matala'].forEach(pri=>{
    const list=active.filter(t=>t.priority===pri);
    const isOpen=!collapsed[pri];
    html+=`<div class="pri-section ${pri}" id="ps-${pri}"
      ondragover="event.preventDefault();document.getElementById('ps-${pri}').classList.add('drop-over')"
      ondragleave="document.getElementById('ps-${pri}').classList.remove('drop-over')"
      ondrop="document.getElementById('ps-${pri}').classList.remove('drop-over');dropToPri('${pri}')">
  <div class="pri-head" onclick="toggleCollapse('${pri}')">
    <div class="pri-head-left">
      <span class="pri-dot ${pri}"></span>
      <span class="pri-label">${PRI_LABELS[pri]}</span>
      <span class="pri-count">${list.length}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="event.stopPropagation();openModalWithPri('${pri}')" style="background:#FFD600;border:none;border-radius:6px;color:#111;font-size:10px;font-weight:700;padding:2px 8px;cursor:pointer">+ Lisää</button>
      <span class="pri-chevron${isOpen?' open':''}">›</span>
    </div>
  </div>
  <div class="pri-body${isOpen?'':' collapsed'}">
    ${list.length?list.map(t=>taskCard(t)).join(''):'<div class="t-empty">Ei tehtäviä</div>'}
  </div>
</div>`;
  });
  html+='</div>';

  // Toistuvat
  const recOpen=!collapsed['rec'];
  html+=`<div class="extra-panel">
  <div class="ep-head" onclick="toggleCollapse('rec')">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="ep-title">↻ Toistuvat</span>
      <span class="pri-count">${recurring.length}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="event.stopPropagation();openRModal()" style="background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#FFD600;font-size:10px;font-weight:700;padding:2px 8px;cursor:pointer">+ Lisää</button>
      <span class="ep-chevron${recOpen?' open':''}">›</span>
    </div>
  </div>
  <div class="ep-body${recOpen?'':' collapsed'}">
    ${recurring.length?recurring.map(r=>{
      const desc=r.type==='weekly'?r.dows.map(d=>['Su','Ma','Ti','Ke','To','Pe','La'][d]).join(', '):`Kuun ${r.monthDay}. päivä`;
      return`<div class="r-card" id="rc-${r.id}"><div class="t-row"><span class="t-name">${esc(r.name)}</span><span class="rec-pill">${desc}</span><div class="t-btns"><button class="iBtn" onclick="editRec('${r.id}')">${eSvg}</button><button class="iBtn" onclick="delRec('${r.id}')">${dSvg}</button></div></div></div>`;
    }).join(''):'<div class="t-empty">Ei toistuvia</div>'}
  </div>
</div>`;

  // Arkisto
  const archOpen=!collapsed['arch'];
  html+=`<div class="extra-panel">
  <div class="ep-head" onclick="toggleCollapse('arch')">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="ep-title">Arkisto</span>
      <span class="pri-count">${done.length}</span>
    </div>
    <span class="ep-chevron${archOpen?' open':''}">›</span>
  </div>
  <div class="ep-body${archOpen?'':' collapsed'}">
    ${done.length?done.map(t=>`<div class="t-card done-card"><div class="t-row"><div class="done-check checked" onclick="toggleDone('${t.id}')" title="Palauta">${chk}</div><span class="t-name" style="text-decoration:line-through;color:#555">${esc(t.name)}</span>${t.doneAt?`<span class="tag-txt">${new Date(t.doneAt).toLocaleDateString('fi-FI')}</span>`:''}<div class="t-btns"><button class="iBtn" onclick="delTask('${t.id}')">${dSvg}</button></div></div></div>`).join(''):'<div class="t-empty">Arkisto on tyhjä</div>'}
  </div>
</div>`;

  el.innerHTML=html;

  // Drag events
  active.forEach(t=>{
    const c=document.getElementById('tc-'+t.id);if(!c)return;
    c.addEventListener('dragstart',e=>{dragId=t.id;setTimeout(()=>c.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragId=null;});
  });
}

function taskCard(t){
  return`<div class="t-card${t.scheduledDate?' sched':''}${t.expired?' expired-card':''}" id="tc-${t.id}" draggable="true">
  <div class="t-row">
    <div class="done-check" onclick="toggleDone('${t.id}')"></div>
    <span class="t-name">${esc(t.name)}</span>
    ${t.scheduledDate?`<span class="sched-txt">${fmtShort(t.scheduledDate)}</span>`:''}
    ${t.expired?`<span class="expired-lbl">↩</span>`:''}
    <div class="t-btns"><button class="iBtn" onclick="editTask('${t.id}')">${eSvg}</button><button class="iBtn" onclick="delTask('${t.id}')">${dSvg}</button></div>
  </div>
  ${t.tags&&t.tags.length?`<div style="padding-left:19px;margin-top:1px">${t.tags.map(g=>`<span class="tag-txt">#${esc(g)}</span>`).join(' ')}</div>`:''}
</div>`;
}

function dropToPri(pri){
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(t&&t.priority!==pri){t.priority=pri;save();render();}
  dragId=null;
}

function dropOn(di){
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(t){t.scheduledDate=di;t.expired=false;save();render();}
  dragId=null;
}
function unschedule(id){const t=tasks.find(x=>x.id===id);if(t){t.scheduledDate=null;save();render();}}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;t.doneAt=t.done?new Date().toISOString():null;
  if(t.done)t.expired=false;
  save();render();
}

function openModal(){openModalWithPri('normaali');}
function openModalWithPri(pri){
  editId=null;['mName','mTags','mNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mPri').value=pri;
  document.getElementById('mTitle').textContent='Uusi tehtävä';
  document.getElementById('mWrap').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(),50);
}
function editTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('mName').value=t.name;
  document.getElementById('mPri').value=t.priority;
  document.getElementById('mTags').value=(t.tags||[]).join(', ');
  document.getElementById('mNotes').value=t.notes||'';
  document.getElementById('mTitle').textContent='Muokkaa tehtävää';
  document.getElementById('mWrap').classList.add('open');
}
function closeModal(){document.getElementById('mWrap').classList.remove('open');}
function saveTask(){
  const name=document.getElementById('mName').value.trim();if(!name)return;
  const prev=editId?tasks.find(x=>x.id===editId):{};
  const data={id:editId||uid(),name,priority:document.getElementById('mPri').value,tags:document.getElementById('mTags').value.split(',').map(s=>s.trim()).filter(Boolean),notes:document.getElementById('mNotes').value.trim(),scheduledDate:prev.scheduledDate||null,done:prev.done||false,doneAt:prev.doneAt||null,expired:false};
  if(editId){const i=tasks.findIndex(x=>x.id===editId);tasks[i]=data;}else tasks.push(data);
  closeModal();save();render();
}
function delTask(id){if(!confirm('Poistetaanko tehtävä?'))return;tasks=tasks.filter(x=>x.id!==id);save();render();}

function setRecType(t){
  recType=t;
  document.getElementById('rt-weekly').classList.toggle('on',t==='weekly');
  document.getElementById('rt-monthly').classList.toggle('on',t==='monthly');
  document.getElementById('r-weekly-opts').style.display=t==='weekly'?'':'none';
  document.getElementById('r-monthly-opts').style.display=t==='monthly'?'':'none';
}
function toggleDow(d){
  if(selDows.has(d)&&selDows.size>1)selDows.delete(d);else selDows.add(d);
  document.querySelectorAll('.dow-btn').forEach(b=>b.classList.toggle('on',selDows.has(parseInt(b.dataset.dow))));
}
function openRModal(){
  editRId=null;document.getElementById('rName').value='';document.getElementById('rNotes').value='';document.getElementById('rMonthDay').value='1';
  recType='weekly';selDows=new Set([1]);setRecType('weekly');
  document.querySelectorAll('.dow-btn').forEach(b=>b.classList.toggle('on',b.dataset.dow==='1'));
  document.getElementById('rTitle').textContent='Uusi toistuva tehtävä';
  document.getElementById('rWrap').classList.add('open');
  setTimeout(()=>document.getElementById('rName').focus(),50);
}
function editRec(id){
  const r=recurring.find(x=>x.id===id);if(!r)return;
  editRId=id;document.getElementById('rName').value=r.name;document.getElementById('rNotes').value=r.notes||'';
  recType=r.type;
  if(r.type==='weekly'){selDows=new Set(r.dows);document.querySelectorAll('.dow-btn').forEach(b=>b.classList.toggle('on',selDows.has(parseInt(b.dataset.dow))));}
  else document.getElementById('rMonthDay').value=r.monthDay;
  setRecType(r.type);document.getElementById('rTitle').textContent='Muokkaa toistuvaa';
  document.getElementById('rWrap').classList.add('open');
}
function closeRModal(){document.getElementById('rWrap').classList.remove('open');}
function saveRecurring(){
  const name=document.getElementById('rName').value.trim();if(!name)return;
  const data={id:editRId||uid(),name,type:recType,dows:recType==='weekly'?[...selDows]:[],monthDay:recType==='monthly'?parseInt(document.getElementById('rMonthDay').value)||1:null,notes:document.getElementById('rNotes').value.trim()};
  if(editRId){const i=recurring.findIndex(x=>x.id===editRId);recurring[i]=data;}else recurring.push(data);
  closeRModal();saveRec();render();
}
function delRec(id){if(!confirm('Poistetaanko toistuva tehtävä?'))return;recurring=recurring.filter(x=>x.id!==id);saveRec();render();}

checkPassword();
load();
</script>
