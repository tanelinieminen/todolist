<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalenteri</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0efea;padding:16px;min-height:100vh}
.app{display:grid;grid-template-columns:1fr 272px;gap:14px;align-items:start}
.panel{background:#fff;border:1px solid #dddcD5;border-radius:16px;overflow:hidden}
.cal-nav{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid #dddcD5}
.nav-btn{background:#fff;border:1px solid #dddcD5;border-radius:8px;width:30px;height:30px;cursor:pointer;color:#555;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-btn:hover{background:#f5f4ef}
.cal-title{font-size:14px;font-weight:500;color:#1a1a1a;flex:1;text-align:center}
.seg{display:flex;background:#f0efea;border-radius:8px;padding:3px;gap:2px;flex-shrink:0}
.seg-btn{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;transition:all .1s}
.seg-btn.on{background:#fff;color:#1a1a1a;border:1px solid #dddcD5;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.week-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.week-day-row{display:flex;gap:10px;align-items:flex-start}
.week-day-label{width:44px;flex-shrink:0;padding-top:2px;text-align:center}
.wdl-name{font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em}
.wdl-num{font-size:22px;font-weight:500;color:#555;line-height:1.1}
.wdl-num.today-n{width:34px;height:34px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.week-day-drop{flex:1;min-height:44px;border-radius:10px;border:1.5px dashed #e0dfd8;background:#fafaf8;padding:6px;display:flex;flex-direction:column;gap:5px;transition:border-color .12s,background .12s}
.week-day-drop.has-tasks{border-style:solid;background:#fff}
.week-day-drop.drag-over{border-color:#378ADD;background:#eef5fd}
.week-day-drop.today-drop{border-color:#ccc;border-style:solid;background:#fff}
.wk-task{border-radius:8px;padding:7px 10px;font-size:12px;font-weight:500;line-height:1.4;display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.wk-task.korkea{background:#fde8df;color:#7a2f12}
.wk-task.normaali{background:#fdf0d8;color:#6b3e08}
.wk-task.matala{background:#e6f4d8;color:#3a6610}
.wk-task-name{flex:1;word-break:break-word}
.wk-rm{background:none;border:none;cursor:pointer;color:inherit;opacity:.4;font-size:15px;padding:0;line-height:1;flex-shrink:0}
.wk-rm:hover{opacity:1}
.drop-hint{font-size:11px;color:#ccc;text-align:center;padding:8px 0;pointer-events:none}
.month-body{padding:10px 12px 14px}
.month-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.month-dow span{text-align:center;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.04em;padding:4px 0}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.m-cell{min-height:64px;border-radius:10px;padding:4px 5px;border:1.5px solid transparent;cursor:pointer;transition:background .1s}
.m-cell:hover{background:#f5f4ef}
.m-cell.other{opacity:.4}
.m-cell.sel{background:#f5f4ef;border-color:#ccc}
.m-cell.drag-over{border-color:#378ADD;background:#eef5fd}
.m-num{font-size:11px;font-weight:500;color:#666;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
.m-num.today{background:#1a1a1a;color:#fff}
.m-chip{border-radius:4px;padding:1px 5px;font-size:9px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.m-chip.korkea{background:#fde8df;color:#7a2f12}
.m-chip.normaali{background:#fdf0d8;color:#6b3e08}
.m-chip.matala{background:#e6f4d8;color:#3a6610}
.m-more{font-size:9px;color:#bbb}
.day-panel{display:none;background:#fff;border:1px solid #dddcD5;border-radius:16px;overflow:hidden;margin-top:12px}
.day-panel.open{display:block}
.dp-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #dddcD5}
.dp-title{font-size:13px;font-weight:500;color:#1a1a1a}
.dp-close{background:none;border:none;cursor:pointer;color:#aaa;font-size:20px;line-height:1;padding:0}
.dp-close:hover{color:#1a1a1a}
.dp-body{padding:10px;display:flex;flex-direction:column;gap:6px}
.dp-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f8f8f6;border-radius:10px;border:1px solid #eee}
.dp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dp-dot.korkea{background:#d85a30}
.dp-dot.normaali{background:#ba7517}
.dp-dot.matala{background:#639922}
.dp-name{font-size:12px;font-weight:500;color:#1a1a1a;flex:1}
.dp-rm{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;line-height:1}
.dp-rm:hover{color:#c0392b}
.dp-empty{font-size:12px;color:#bbb;text-align:center;padding:16px;line-height:1.6}
.task-panel{background:#fff;border:1px solid #dddcD5;border-radius:16px;overflow:hidden}
.tp-head{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid #dddcD5}
.tp-title{font-size:13px;font-weight:500;color:#1a1a1a}
.btn-add{height:30px;padding:0 13px;border-radius:8px;background:#1a1a1a;color:#fff;font-size:12px;font-weight:500;cursor:pointer;border:none}
.btn-add:hover{background:#333}
.t-list{padding:10px;display:flex;flex-direction:column;gap:6px}
.t-card{border-radius:12px;border:1.5px solid #e5e4dc;background:#f8f8f6;padding:10px 12px;cursor:grab;user-select:none;transition:opacity .15s}
.t-card:active{cursor:grabbing;opacity:.5}
.t-card.dragging{opacity:.25}
.t-card.sched{border-left:3px solid #378ADD;border-radius:0 12px 12px 0}
.t-card.expired-card{border-left:3px solid #e24b4a;border-radius:0 12px 12px 0}
.t-card.done-card{opacity:.5;border-style:dashed}
.t-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.done-check{width:17px;height:17px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:#fff;margin-top:1px;transition:all .12s}
.done-check.checked{background:#1a1a1a;border-color:#1a1a1a}
.done-check svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.t-name-wrap{flex:1;display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.t-name{font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.45;flex:1}
.t-btns{display:flex;gap:2px;opacity:0;transition:opacity .12s;flex-shrink:0}
.t-card:hover .t-btns{opacity:1}
.iBtn{background:none;border:none;cursor:pointer;width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#bbb}
.iBtn:hover{background:#eee;color:#1a1a1a}
.iBtn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.t-foot{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pri-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.pri-pill.korkea{background:#fde8df;color:#7a2f12}
.pri-pill.normaali{background:#fdf0d8;color:#6b3e08}
.pri-pill.matala{background:#e6f4d8;color:#3a6610}
.tag-txt{font-size:10px;color:#bbb}
.sched-txt{font-size:10px;color:#185FA5;margin-left:auto}
.expired-lbl{font-size:10px;color:#c0392b;margin-left:auto}
.t-empty{font-size:12px;color:#bbb;text-align:center;padding:20px;line-height:1.6}
.m-wrap{display:none;position:fixed;inset:0;z-index:200;align-items:center;justify-content:center}
.m-wrap.open{display:flex}
.m-scrim{position:absolute;inset:0;background:rgba(0,0,0,.2)}
.modal{position:relative;z-index:1;background:#fff;border:1px solid #ddd;border-radius:16px;padding:22px;width:92%;max-width:340px}
.m-title{font-size:14px;font-weight:500;margin-bottom:16px;color:#1a1a1a}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#aaa;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1px solid #ddd;border-radius:10px;background:#f8f8f6;color:#1a1a1a;font-size:13px;font-family:inherit}
.field textarea{resize:vertical;min-height:48px;line-height:1.5}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.m-foot button{height:34px;padding:0 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #ddd}
.btn-ok{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-ok:hover{background:#333}
.btn-ko{background:transparent;color:#666}
.btn-ko:hover{background:#f0efea}
</style>
</head>
<body>

<div class="app">
  <div>
    <div class="panel">
      <div class="cal-nav">
        <button class="nav-btn" onclick="navBack()">‹</button>
        <span class="cal-title" id="cal-title"></span>
        <button class="nav-btn" onclick="navFwd()">›</button>
        <div class="seg">
          <button class="seg-btn on" id="vt-week" onclick="setView('week')">Viikko</button>
          <button class="seg-btn" id="vt-month" onclick="setView('month')">Kuukausi</button>
        </div>
      </div>
      <div id="cal-body"></div>
    </div>
    <div class="day-panel" id="day-panel">
      <div class="dp-head">
        <span class="dp-title" id="dp-title"></span>
        <button class="dp-close" onclick="closeDay()">×</button>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </div>
  </div>

  <div class="task-panel">
    <div class="tp-head">
      <span class="tp-title">Tehtävät</span>
      <button class="btn-add" onclick="openModal()">+ Lisää</button>
    </div>
    <div class="t-list" id="t-list"></div>
  </div>
</div>

<div class="m-wrap" id="mWrap">
  <div class="m-scrim" onclick="closeModal()"></div>
  <div class="modal">
    <div class="m-title" id="mTitle">Uusi tehtävä</div>
    <div class="field"><label>Otsikko</label><input id="mName" placeholder="Tehtävän nimi"></div>
    <div class="mrow">
      <div class="field"><label>Prioriteetti</label>
        <select id="mPri"><option value="korkea">Korkea</option><option value="normaali" selected>Normaali</option><option value="matala">Matala</option></select>
      </div>
      <div class="field"><label>Tagit</label><input id="mTags" placeholder="työ, myynti"></div>
    </div>
    <div class="field"><label>Muistiinpanot</label><textarea id="mNotes" placeholder="Vapaaehtoinen"></textarea></div>
    <div class="m-foot">
      <button class="btn-ko" onclick="closeModal()">Peruuta</button>
      <button class="btn-ok" onclick="saveTask()">Tallenna</button>
    </div>
  </div>
</div>

<script>
const DOW=['Ma','Ti','Ke','To','Pe','La','Su'];
const MON=['tammikuu','helmikuu','maaliskuu','huhtikuu','toukokuu','kesäkuu','heinäkuu','elokuu','syyskuu','lokakuu','marraskuu','joulukuu'];
const MON_GEN=['tammikuuta','helmikuuta','maaliskuuta','huhtikuuta','toukokuuta','kesäkuuta','heinäkuuta','elokuuta','syyskuuta','lokakuuta','marraskuuta','joulukuuta'];

let tasks=[],editId=null,dragId=null,selDate=null,view='week';
const now=new Date();
let viewYear=now.getFullYear(),viewMonth=now.getMonth();
let weekStart=weekOf(now);

const eSvg=`<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>`;
const dSvg=`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>`;
const chkSvg=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

function weekOf(d){const t=new Date(d);let dw=t.getDay()-1;if(dw<0)dw=6;t.setDate(t.getDate()-dw);t.setHours(0,0,0,0);return t;}
function addD(d,n){const t=new Date(d);t.setDate(t.getDate()+n);return t;}
function iso(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;}
function todayIso(){return iso(new Date());}
function fmtShort(s){if(!s)return'';const[,m,d]=s.split('-');return`${parseInt(d)}.${parseInt(m)}.`;}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function uid(){return Math.random().toString(36).slice(2,10);}

function checkPassword(){
  const saved=localStorage.getItem('kal-auth');
  if(saved==='ok')return;
  const pw=prompt('Syötä salasana:');
  if(pw!=='3110'){
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;color:#aaa">Väärä salasana — päivitä sivu uudelleen.</div>';
    return;
  }
  localStorage.setItem('kal-auth','ok');
}

function load(){
  try{const r=localStorage.getItem('kal5');tasks=r?JSON.parse(r):[];if(!tasks.length)tasks=[];}
  catch(e){tasks=[];}
  expireOld();render();
}

function save(){try{localStorage.setItem('kal5',JSON.stringify(tasks));}catch(e){}}

function expireOld(){
  const ti=todayIso();let ch=false;
  tasks.forEach(t=>{
    if(t.scheduledDate&&t.scheduledDate<ti&&!t.done){
      t.scheduledDate=null;t.expired=true;ch=true;
    }
  });
  if(ch)save();
}

function setView(v){
  view=v;
  document.getElementById('vt-week').classList.toggle('on',v==='week');
  document.getElementById('vt-month').classList.toggle('on',v==='month');
  closeDay();render();
}
function navBack(){view==='week'?weekStart=addD(weekStart,-7):(--viewMonth<0&&(viewMonth=11,viewYear--));closeDay();render();}
function navFwd(){view==='week'?weekStart=addD(weekStart,7):(++viewMonth>11&&(viewMonth=0,viewYear++));closeDay();render();}
function render(){view==='week'?renderWeek():renderMonth();renderList();if(selDate)renderDayPanel(selDate);}

function renderWeek(){
  const ws=weekStart,we=addD(ws,6);
  const sm=ws.getMonth(),em=we.getMonth();
  const title=sm===em
    ?`${ws.getDate()}–${we.getDate()}. ${MON_GEN[sm]} ${ws.getFullYear()}`
    :`${ws.getDate()}. ${MON_GEN[sm]} – ${we.getDate()}. ${MON_GEN[em]} ${we.getFullYear()}`;
  document.getElementById('cal-title').textContent=title;
  const ti=todayIso();
  let h='<div class="week-body">';
  for(let i=0;i<7;i++){
    const d=addD(ws,i),di=iso(d),isT=di===ti;
    const dt=tasks.filter(t=>t.scheduledDate===di);
    const numH=isT?`<div class="wdl-num today-n">${d.getDate()}</div>`:`<div class="wdl-num">${d.getDate()}</div>`;
    const chipHtml=dt.length
      ?dt.map(t=>`<div class="wk-task ${t.priority}"><span class="wk-task-name">${esc(t.name)}</span><button class="wk-rm" onclick="unschedule('${t.id}')" title="Poista päivältä">×</button></div>`).join('')
      :`<div class="drop-hint">pudota tähän</div>`;
    h+=`<div class="week-day-row">
  <div class="week-day-label"><div class="wdl-name">${DOW[i]}</div>${numH}</div>
  <div class="week-day-drop${dt.length?' has-tasks':''}${isT?' today-drop':''}" id="wc-${di}"
    ondragover="event.preventDefault();document.getElementById('wc-${di}').classList.add('drag-over')"
    ondragleave="document.getElementById('wc-${di}').classList.remove('drag-over')"
    ondrop="document.getElementById('wc-${di}').classList.remove('drag-over');dropOn('${di}')">
    ${chipHtml}
  </div>
</div>`;
  }
  h+='</div>';
  document.getElementById('cal-body').innerHTML=h;
}

function renderMonth(){
  document.getElementById('cal-title').textContent=MON[viewMonth]+' '+viewYear;
  const ti=todayIso();
  const first=new Date(viewYear,viewMonth,1);
  let sd=first.getDay()-1;if(sd<0)sd=6;
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const prev=new Date(viewYear,viewMonth,0).getDate();
  const total=Math.ceil((sd+dim)/7)*7;
  let h=`<div class="month-body"><div class="month-dow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div><div class="month-grid">`;
  for(let i=0;i<total;i++){
    let d,m,y,other=false;
    if(i<sd){d=prev-sd+i+1;m=viewMonth-1;y=viewYear;if(m<0){m=11;y--;}other=true;}
    else if(i>=sd+dim){d=i-sd-dim+1;m=viewMonth+1;y=viewYear;if(m>11){m=0;y++;}other=true;}
    else{d=i-sd+1;m=viewMonth;y=viewYear;}
    const di=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=di===ti,isSel=di===selDate;
    const dt=tasks.filter(t=>t.scheduledDate===di);
    const numH=isT?`<div class="m-num today">${d}</div>`:`<div class="m-num">${d}</div>`;
    h+=`<div class="m-cell${other?' other':''}${isSel?' sel':''}" id="mc-${di}"
      ondragover="event.preventDefault();document.getElementById('mc-${di}').classList.add('drag-over')"
      ondragleave="document.getElementById('mc-${di}').classList.remove('drag-over')"
      ondrop="document.getElementById('mc-${di}').classList.remove('drag-over');dropOn('${di}')"
      onclick="openDay('${di}')">
      ${numH}
      ${dt.slice(0,2).map(t=>`<div class="m-chip ${t.priority}">${esc(t.name)}</div>`).join('')}
      ${dt.length>2?`<div class="m-more">+${dt.length-2}</div>`:''}
    </div>`;
  }
  h+='</div></div>';
  document.getElementById('cal-body').innerHTML=h;
}

function openDay(di){selDate=di;document.getElementById('day-panel').classList.add('open');renderDayPanel(di);if(view==='month')renderMonth();}
function closeDay(){selDate=null;document.getElementById('day-panel').classList.remove('open');}
function renderDayPanel(di){
  const[y,m,d]=di.split('-');
  document.getElementById('dp-title').textContent=`${parseInt(d)}. ${MON_GEN[parseInt(m)-1]} ${y}`;
  const dt=tasks.filter(t=>t.scheduledDate===di);
  document.getElementById('dp-body').innerHTML=dt.length
    ?dt.map(t=>`<div class="dp-row"><span class="dp-dot ${t.priority}"></span><span class="dp-name">${esc(t.name)}</span><button class="dp-rm" onclick="unschedule('${t.id}')">×</button></div>`).join('')
    :'<div class="dp-empty">Ei tehtäviä — raahaa tehtävä tähän päivään</div>';
}

function renderList(){
  const el=document.getElementById('t-list');
  if(!tasks.length){el.innerHTML='<div class="t-empty">Lisää tehtäviä ja<br>raahaa ne kalenteriin</div>';return;}
  el.innerHTML=tasks.map(t=>`
<div class="t-card${t.scheduledDate?' sched':''}${t.expired&&!t.done?' expired-card':''}${t.done?' done-card':''}" id="tc-${t.id}" draggable="true">
  <div class="t-top">
    <div class="done-check${t.done?' checked':''}" onclick="toggleDone('${t.id}')">
      ${t.done?chkSvg:''}
    </div>
    <div class="t-name-wrap">
      <span class="t-name" style="${t.done?'text-decoration:line-through;color:#aaa':''}">${esc(t.name)}</span>
      <div class="t-btns">
        <button class="iBtn" onclick="editTask('${t.id}')">${eSvg}</button>
        <button class="iBtn" onclick="delTask('${t.id}')">${dSvg}</button>
      </div>
    </div>
  </div>
  <div class="t-foot">
    <span class="pri-pill ${t.priority}">${t.priority}</span>
    ${t.tags.map(g=>`<span class="tag-txt">#${esc(g)}</span>`).join('')}
    ${t.scheduledDate?`<span class="sched-txt">${fmtShort(t.scheduledDate)}</span>`:''}
    ${t.expired&&!t.done?`<span class="expired-lbl">↩ palautettu</span>`:''}
  </div>
</div>`).join('');
  tasks.forEach(t=>{
    const c=document.getElementById('tc-'+t.id);if(!c)return;
    c.addEventListener('dragstart',e=>{dragId=t.id;setTimeout(()=>c.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragId=null;});
  });
}

function dropOn(di){
  if(!dragId)return;
  const t=tasks.find(x=>x.id===dragId);
  if(t){t.scheduledDate=di;t.expired=false;save();render();}
  dragId=null;
}
function unschedule(id){
  const t=tasks.find(x=>x.id===id);if(t){t.scheduledDate=null;save();render();}
}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;if(t.done)t.expired=false;
  save();render();
}
function openModal(){
  editId=null;['mName','mTags','mNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mPri').value='normaali';
  document.getElementById('mTitle').textContent='Uusi tehtävä';
  document.getElementById('mWrap').classList.add('open');
  setTimeout(()=>document.getElementById('mName').focus(),50);
}
function editTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('mName').value=t.name;
  document.getElementById('mPri').value=t.priority;
  document.getElementById('mTags').value=t.tags.join(', ');
  document.getElementById('mNotes').value=t.notes||'';
  document.getElementById('mTitle').textContent='Muokkaa tehtävää';
  document.getElementById('mWrap').classList.add('open');
}
function closeModal(){document.getElementById('mWrap').classList.remove('open');}
function saveTask(){
  const name=document.getElementById('mName').value.trim();if(!name)return;
  const data={
    id:editId||uid(),name,
    priority:document.getElementById('mPri').value,
    tags:document.getElementById('mTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    notes:document.getElementById('mNotes').value.trim(),
    scheduledDate:editId?(tasks.find(x=>x.id===editId)||{}).scheduledDate||null:null,
    done:editId?(tasks.find(x=>x.id===editId)||{}).done||false:false,
    expired:false,
  };
  if(editId){const i=tasks.findIndex(x=>x.id===editId);tasks[i]=data;}
  else tasks.push(data);
  closeModal();save();render();
}
function delTask(id){
  if(!confirm('Poistetaanko tehtävä?'))return;
  tasks=tasks.filter(x=>x.id!==id);save();render();
}

checkPassword();
load();
</script>
</body>
